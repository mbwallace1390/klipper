name: Build K1 GD32 Toolhead Firmware

on:
  push:
    branches:
      - k1-gd32-toolhead
    paths:
      - .github/workflows/build-k1-toolhead.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out current Klipper branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge Pellcorp K1/GD32 support into temporary workspace
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add pellcorp https://github.com/pellcorp/k1-klipper-firmware.git
          git fetch --no-tags pellcorp jun2025
          echo "Current Klipper commit: $(git rev-parse HEAD)" | tee build-info.txt
          echo "Pellcorp commit: $(git rev-parse pellcorp/jun2025)" | tee -a build-info.txt
          echo "Merge base: $(git merge-base HEAD pellcorp/jun2025)" | tee -a build-info.txt

          set +e
          git merge --no-commit --no-ff pellcorp/jun2025
          merge_status=$?
          set -e

          if [ "$merge_status" -ne 0 ]; then
            conflicts="$(git diff --name-only --diff-filter=U)"
            printf 'Initial merge conflicts:\n%s\n' "$conflicts" | tee merge-conflicts.txt

            for file in \
              .github/workflows/build-test.yaml \
              .github/workflows/klipper3d-deploy.yaml \
              .github/workflows/stale-issue-bot.yaml
            do
              if printf '%s\n' "$conflicts" | grep -Fxq "$file"; then
                git checkout --ours -- "$file"
                git add "$file"
              fi
            done

            remaining="$(git diff --name-only --diff-filter=U)"
            if [ -n "$remaining" ]; then
              printf 'Unresolved merge conflicts:\n%s\n' "$remaining" | tee -a merge-conflicts.txt
              git status --short | tee merge-status.txt
              exit 2
            fi

            echo "Only unrelated workflow delete/modify conflicts were found; kept current upstream workflow files." | tee -a build-info.txt
          fi

          git status --short | tee merge-status.txt

      - name: Build nozzle MCU firmware
        shell: bash
        run: |
          set -euxo pipefail
          docker pull pellcorp/k1-klipper-fw-build
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --env HOME=/tmp \
            -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            pellcorp/k1-klipper-fw-build \
            "$GITHUB_WORKSPACE/_build.sh" noz
          find outfw -maxdepth 2 -type f -print | tee -a build-info.txt

      - name: Upload build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k1-gd32-toolhead-build
          if-no-files-found: warn
          path: |
            outfw/**/*.bin
            build-info.txt
            merge-conflicts.txt
            merge-status.txt
            .config
            .config.noz
